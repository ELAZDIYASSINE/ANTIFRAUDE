version: '3.8'

services:
  # Main Application
  antifraud-app:
    build: .
    container_name: antifraud-app
    ports:
      - "8000:8000"  # FastAPI
      - "8501:8501"  # Streamlit
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./mlruns:/app/mlruns
    environment:
      - SPARK_MASTER=local[*]
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
      - redis
    networks:
      - antifraud-network

  # MLflow Tracking Server
  mlflow:
    image: python:3.11-slim
    container_name: antifraud-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
    command: >
      bash -c "pip install mlflow && 
               mlflow server --host 0.0.0.0 --port 5000 
               --default-artifact-root /app/mlruns"
    networks:
      - antifraud-network

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: antifraud-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - antifraud-network

  # Jupyter Notebook for development
  jupyter:
    build: .
    container_name: antifraud-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./:/app
    command: >
      bash -c "pip install jupyter && 
               jupyter notebook --ip=0.0.0.0 --port=8888 
               --no-browser --allow-root --NotebookApp.token=''"
    networks:
      - antifraud-network

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: antifraud-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - antifraud-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: antifraud-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - antifraud-network

  # Kafka for streaming
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: antifraud-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - antifraud-network

  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: antifraud-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - antifraud-network

volumes:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  antifraud-network:
    driver: bridge
