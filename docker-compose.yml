version: '3.8'

services:
  # Main Application
  antifraud-app:
    build: .
    container_name: antifraud-app
    ports:
      - "8000:8000"  # FastAPI
      - "8501:8501"  # Streamlit
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./mlruns:/app/mlruns
    environment:
      - SPARK_MASTER=local[*]
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
      - redis
    networks:
      - antifraud-network

  # MLflow Tracking Server
  mlflow:
    image: python:3.11-slim
    container_name: antifraud-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
    command: >
      bash -c "pip install mlflow && 
               mlflow server --host 0.0.0.0 --port 5000 
               --default-artifact-root /app/mlruns"
    networks:
      - antifraud-network

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: antifraud-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - antifraud-network

  # Jupyter Notebook for development
  jupyter:
    build: .
    container_name: antifraud-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./:/app
    command: >
      bash -c "pip install jupyter && 
               jupyter notebook --ip=0.0.0.0 --port=8888 
               --no-browser --allow-root --NotebookApp.token=''"
    networks:
      - antifraud-network

volumes:
  redis_data:

networks:
  antifraud-network:
    driver: bridge
